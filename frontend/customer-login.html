<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Customer Login - Malki Salon</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
<header>
  <div class="container">
    <div class="nav">
      <a class="brand" href="index.html"><span class="brand-dot"></span>Malki Salon</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="booking.html">Book</a>
        <a href="customer-login.html" style="text-decoration:underline">Customer</a>
      </nav>
    </div>
  </div>
</header>

<main class="container" style="padding:18px 0 40px;">
  <div class="hero" style="margin-top:18px;">
    <div class="hero-inner" style="grid-template-columns: 1fr;">
      <div>
        <h1 style="font-size:34px;">Customer Account</h1>
        <p>Login to view your bookings, cancel appointments, and manage your profile.</p>
      </div>

      <div class="grid" style="grid-template-columns: 1fr 1fr;">
        <section class="card" style="padding:16px;">
          <div class="badge">Login</div>
          <form id="loginForm" style="margin-top:10px;">
            <label class="muted">Email</label>
            <input name="email" type="email" required />
            <label class="muted">Password</label>
            <input name="password" type="password" required />
            <button class="btn" type="submit" style="margin-top:10px;width:100%;">Login</button>
            <div id="loginStatus" class="muted" style="margin-top:10px;"></div>
          </form>
        </section>

        <section class="card" style="padding:16px;">
          <div class="badge">Create account</div>
          <form id="registerForm" style="margin-top:10px;">
            <label class="muted">Name</label>
            <input name="name" required />
            <label class="muted">Phone</label>
            <input name="phone" required />
            <label class="muted">Email</label>
            <input name="email" type="email" required />
            <label class="muted">Password</label>
            <input name="password" type="password" required minlength="6" />
            <button class="btn" type="submit" style="margin-top:10px;width:100%;">Create account</button>
            <div id="registerStatus" class="muted" style="margin-top:10px;"></div>
          </form>
        </section>
      </div>

      <div class="card" style="padding:14px;margin-top:14px;">
        <div class="muted"><b>Tip:</b> After login, you can book appointments faster (your details auto-fill in the booking form).</div>
      </div>
    </div>
  </div>
</main>

<script src="assets/js/app.js"></script>
<script src="assets/js/customer-auth.js"></script>
<script src="assets/js/customer-login.js"></script>
</body>
</html>
